[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Static site - no build needed'"

[functions]
  external_node_modules = ["better-sqlite3"]
  node_bundler = "nft"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
